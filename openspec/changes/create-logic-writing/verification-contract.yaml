    depends_on_receipts: []
    command: python
    args: [-m, pytest, -q, tests/contract/test_adapters.py]
    timeout_seconds: 600
    required: true
    covers: [req.routing.provider-boundary, req.investigation.depth, req.investigation.traceguard, req.investigation.adjudication, req.academic.structure, req.academic.deepening, req.academic.documents, req.academic.pdf, req.closure.native-owners, req.closure.render]
    expected: {exit_code: 0}

  - id: check.tests.investigation
