    expected: {exit_code: 0}

  - id: check.models.alignment
    kind: command
    semantic_check_id: logic-writing.flowguard.model-test-alignment
    execution_id: create-logic-writing.model-test-alignment.v1
    validation_scope: full
    snapshot_policy: frozen
    toolchain_identity: flowguard-0.55.0-python
    input_selectors: [.flowguard/model_test_alignment/**, .flowguard/models/**, skills/logic-writing/scripts/**, tests/**]
    depends_on_receipts: [check.tests.routing, check.tests.adapters, check.tests.investigation, check.tests.academic, check.tests.reader, check.tests.freshness]
    command: python
    args: [.flowguard/model_test_alignment/run_checks.py, --json]
    timeout_seconds: 600
    required: true
    covers: [req.routing.one-owner, req.investigation.packet, req.academic.actual-artifact, req.reader.actual-text, req.closure.verifier-derived, req.closure.minimum-content, req.closure.native-owners, req.closure.frozen-materialization]
    expected: {exit_code: 0}

  - id: check.models.full
    kind: command
