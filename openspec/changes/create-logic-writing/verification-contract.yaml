    execution_id: create-logic-writing.academic.v1
    validation_scope: focused
    snapshot_policy: live
    toolchain_identity: python-pytest
    input_selectors: [skills/logic-writing/references/routes/academic-writing.md, skills/logic-writing/scripts/validate_revision_provenance.py, skills/logic-writing/scripts/validate_claim_support.py, tests/unit/test_academic.py]
    depends_on_receipts: [check.tests.adapters]
    command: python
    args: [-m, pytest, -q, tests/unit/test_academic.py]
    timeout_seconds: 600
    required: true
    covers: [req.academic.owner, req.academic.evidence-handoff, req.academic.structure, req.academic.deepening, req.academic.documents, req.academic.pdf, req.academic.citations, req.academic.provenance, req.academic.actual-artifact, req.academic.final-owner, req.closure.minimum-content]
    expected: {exit_code: 0}

  - id: check.tests.reader
    kind: command
    semantic_check_id: logic-writing.reader.focused
    execution_id: create-logic-writing.reader.v1
    validation_scope: focused
    snapshot_policy: live
    toolchain_identity: python-pytest
