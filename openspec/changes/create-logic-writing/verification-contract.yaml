contract_version: 1
change: create-logic-writing

obligations:
  - id: req.routing.one-owner
    source: "specs/unified-routing/spec.md#Requirement: Exactly one final owner"
    claim: Every non-trivial request has exactly one final owner.
    required: true
    evidence: [check.tests.routing, check.tests.e2e, check.models.full]
  - id: req.routing.terminal-deliverable
    source: "specs/unified-routing/spec.md#Requirement: Route by terminal deliverable"
    claim: The terminal artifact, not the first action, determines ownership.
    required: true
    evidence: [check.tests.routing, check.tests.e2e]
  - id: req.routing.bounded-child
    source: "specs/unified-routing/spec.md#Requirement: Mixed-route work uses bounded child requests"
    claim: Academic-owned work can use investigation only as a bounded child.
    required: true
    evidence: [check.tests.routing, check.tests.e2e, check.models.full]
  - id: req.routing.fingerprint
    source: "specs/unified-routing/spec.md#Requirement: Route decisions are fingerprinted"
    claim: Material request changes stale the route decision.
    required: true
    evidence: [check.tests.routing, check.tests.freshness]
  - id: req.routing.ambiguity
    source: "specs/unified-routing/spec.md#Requirement: Ambiguity remains explicit"
    claim: Material ambiguity does not activate two owners.
    required: true
    evidence: [check.tests.routing, check.models.full]
  - id: req.routing.skip
    source: "specs/unified-routing/spec.md#Requirement: Trivial and out-of-scope work does not activate"
    claim: Trivial work exits with a visible reason.
    required: true
    evidence: [check.tests.routing]
  - id: req.routing.provider-boundary
    source: "specs/unified-routing/spec.md#Requirement: Required specialist absence blocks domain substitution"
    claim: Missing specialist authority cannot be replaced by a local imitation.
    required: true
    evidence: [check.tests.adapters, check.tests.adversarial]

  - id: req.investigation.contract
    source: "specs/investigation-route/spec.md#Requirement: Investigation begins with a claim and evidence contract"
    claim: Investigation scope and evidence roles are explicit before broad search.
    required: true
    evidence: [check.tests.investigation, check.tests.e2e]
  - id: req.investigation.candidate-boundary
    source: "specs/investigation-route/spec.md#Requirement: Candidate sources are not facts"
    claim: Candidate sources cannot support final factual wording.
    required: true
    evidence: [check.tests.investigation, check.tests.adversarial]
  - id: req.investigation.depth
    source: "specs/investigation-route/spec.md#Requirement: Investigation depth is obligation-driven"
    claim: Critical gaps, lineages, and source roles determine depth.
    required: true
    evidence: [check.tests.investigation, check.tests.adapters, check.tests.e2e]
  - id: req.investigation.traceguard
    source: "specs/investigation-route/spec.md#Requirement: Temporal and causal claims use TraceGuard conditionally"
    claim: Chronology and causal claims use current TraceGuard evidence.
    required: true
    evidence: [check.tests.investigation, check.tests.adapters, check.tests.adversarial]
  - id: req.investigation.adjudication
    source: "specs/investigation-route/spec.md#Requirement: Investigation adjudicates important conclusions"
    claim: Central conclusions face alternatives and opposition before strong wording.
    required: true
    evidence: [check.tests.investigation, check.tests.adapters, check.tests.e2e]
  - id: req.investigation.packet
    source: "specs/investigation-route/spec.md#Requirement: Investigation returns a typed ResearchPacket"
    claim: ResearchPacket content and identity are complete and bounded.
    required: true
    evidence: [check.tests.investigation, check.tests.e2e, check.tests.freshness]
  - id: req.investigation.failure-visibility
    source: "specs/investigation-route/spec.md#Requirement: Provider and execution failures remain visible"
    claim: Provider, execution, access, bounded, and stale states cannot become pass.
    required: true
    evidence: [check.tests.investigation, check.tests.adversarial]
  - id: req.investigation.verifier-closure
    source: "specs/investigation-route/spec.md#Requirement: Investigation completion is verifier-derived"
    claim: Caller-authored completion fields have no closure authority.
    required: true
    evidence: [check.tests.investigation, check.tests.adversarial, check.models.full]

  - id: req.academic.owner
    source: "specs/academic-writing-route/spec.md#Requirement: Academic route owns academic final artifacts"
    claim: Academic work remains academic-owned through final closure.
    required: true
    evidence: [check.tests.academic, check.tests.e2e, check.models.full]
  - id: req.academic.evidence-handoff
    source: "specs/academic-writing-route/spec.md#Requirement: Evidence gaps use bounded investigation handoffs"
    claim: Missing academic evidence becomes a bounded child request, downgrade, or gap.
    required: true
    evidence: [check.tests.academic, check.tests.e2e]
  - id: req.academic.structure
    source: "specs/academic-writing-route/spec.md#Requirement: Academic structure is modeled before broad drafting or revision"
    claim: Important artifact units have structural contribution and progression evidence.
    required: true
    evidence: [check.tests.academic, check.tests.adapters]
  - id: req.academic.deepening
    source: "specs/academic-writing-route/spec.md#Requirement: Important shallow units are deepened before final prose"
    claim: Important shallow units are deepened or receive a terminal treatment.
    required: true
    evidence: [check.tests.academic, check.tests.adapters]
  - id: req.academic.documents
    source: "specs/academic-writing-route/spec.md#Requirement: Existing document work uses the Documents adapter"
    claim: DOCX mutation and visual evidence remain Documents-owned.
    required: true
    evidence: [check.tests.academic, check.tests.adapters, check.tests.adversarial]
  - id: req.academic.pdf
    source: "specs/academic-writing-route/spec.md#Requirement: PDF work uses the PDF adapter"
    claim: PDF content and layout evidence remain separate and PDF-owned.
    required: true
    evidence: [check.tests.academic, check.tests.adapters]
  - id: req.academic.citations
    source: "specs/academic-writing-route/spec.md#Requirement: Citations bind to actual academic claims"
    claim: Important claims bind to a source role and semantic support boundary.
    required: true
    evidence: [check.tests.academic, check.tests.adversarial]
  - id: req.academic.provenance
    source: "specs/academic-writing-route/spec.md#Requirement: Revision provenance is preserved"
    claim: Revision treatments remain visible and current.
    required: true
    evidence: [check.tests.academic, check.tests.freshness]
  - id: req.academic.actual-artifact
    source: "specs/academic-writing-route/spec.md#Requirement: Final academic closure binds the actual artifact"
    claim: Final academic checks bind the exact latest artifact.
    required: true
    evidence: [check.tests.academic, check.tests.freshness, check.tests.e2e]
  - id: req.academic.final-owner
    source: "specs/academic-writing-route/spec.md#Requirement: Only academic writing issues academic final closure"
    claim: No child or layout process can close the academic artifact.
    required: true
    evidence: [check.tests.academic, check.tests.e2e, check.models.full]

  - id: req.reader.two-room
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Reader-facing synthesis uses a two-room boundary"
    claim: The writer receives a sanitized ReaderBrief, not the raw ledger.
    required: true
    evidence: [check.tests.reader, check.tests.e2e]
  - id: req.reader.brief
    source: "specs/reader-facing-synthesis/spec.md#Requirement: ReaderBrief carries content and boundaries"
    claim: ReaderBrief preserves evidence, alternatives, limits, and allowed wording.
    required: true
    evidence: [check.tests.reader, check.tests.adversarial]
  - id: req.reader.actual-text
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Quality is checked on actual text"
    claim: Metadata cannot substitute for current text inspection.
    required: true
    evidence: [check.tests.reader, check.tests.adversarial, check.reader.judgment]
  - id: req.reader.semantic-scope
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Scope escalation is evaluated in context"
    claim: Scope escalation distinguishes unsupported assertions from explicit negation and licensed qualification.
    required: true
    evidence: [check.tests.reader, check.tests.adversarial]
  - id: req.reader.no-internal-language
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Internal language is prohibited by default"
    claim: Default artifacts do not leak internal workflow language.
    required: true
    evidence: [check.tests.reader, check.reader.judgment]
  - id: req.reader.flow
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Paragraph flow is derived from artifact units"
    claim: Reverse outline and transition evidence come from the actual artifact.
    required: true
    evidence: [check.tests.reader, check.tests.adversarial, check.reader.judgment]
  - id: req.reader.genre
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Output is genre-adaptive and artifact-first"
    claim: Final output follows the requested genre instead of an internal diagnostic template.
    required: true
    evidence: [check.tests.reader, check.reader.judgment, check.tests.e2e]
  - id: req.reader.boundaries
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Citations and limitations survive sanitization"
    claim: Reader cleanup cannot strengthen or detach supported claims.
    required: true
    evidence: [check.tests.reader, check.tests.adversarial]
  - id: req.reader.staleness
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Reader-facing edits invalidate affected audits"
    claim: Meaningful prose edits stale affected audit evidence.
    required: true
    evidence: [check.tests.reader, check.tests.freshness]
  - id: req.reader.evidence-classes
    source: "specs/reader-facing-synthesis/spec.md#Requirement: Reader quality uses deterministic and judgment evidence separately"
    claim: Deterministic and judged quality evidence remain distinct and both gate closure.
    required: true
    evidence: [check.tests.reader, check.reader.judgment]

  - id: req.closure.verifier-derived
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Closure status is verifier-derived"
    claim: Closure derives from current evidence, never self-report.
    required: true
    evidence: [check.tests.freshness, check.tests.adversarial, check.models.full]
  - id: req.closure.minimum-content
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Every final closure has a minimum content baseline"
    claim: Process-only green evidence cannot close content; each route supplies its minimum content and reader evidence.
    required: true
    evidence: [check.tests.freshness, check.tests.academic, check.tests.adversarial, check.models.full]
  - id: req.closure.identity
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Every receipt has exact identity"
    claim: Receipts bind exact producer, inputs, outputs, scope, and artifact.
    required: true
    evidence: [check.tests.freshness]
  - id: req.closure.propagation
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Material changes invalidate dependent evidence"
    claim: Dependency edges propagate staleness to every affected consumer.
    required: true
    evidence: [check.tests.freshness, check.models.full]
  - id: req.closure.monotonic
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Failure states propagate monotonically"
    claim: Non-pass states cannot become pass through aggregation.
    required: true
    evidence: [check.tests.freshness, check.tests.adversarial, check.models.full]
  - id: req.closure.no-substitution
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Planning artifacts cannot satisfy proof obligations"
    claim: Plans, candidates, and progress cannot satisfy terminal obligations.
    required: true
    evidence: [check.tests.freshness, check.tests.adversarial]
  - id: req.closure.native-owners
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Native owners remain authoritative"
    claim: Specialist domain ownership is preserved end to end.
    required: true
    evidence: [check.tests.adapters, check.models.full, check.tests.e2e]
  - id: req.closure.final-owner
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Only the final owner issues final closure"
    claim: Child receipts close only bounded obligations.
    required: true
    evidence: [check.tests.freshness, check.tests.e2e, check.models.full]
  - id: req.closure.broad
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Broad claims require broad current receipts"
    claim: Broad wording requires broad current native evidence in all applicable domains.
    required: true
    evidence: [check.tests.freshness, check.tests.adversarial]
  - id: req.closure.render
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Render failures have explicit consequences"
    claim: Content extraction and visual proof remain separate.
    required: true
    evidence: [check.tests.adapters, check.tests.adversarial]
  - id: req.closure.residual-risk
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Closure names residual risk and next owner"
    claim: Non-pass closure identifies affected scope, safe wording, and next owner.
    required: true
    evidence: [check.tests.freshness, check.tests.e2e]
  - id: req.closure.planes
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Operation and release staleness remain separate"
    claim: Operation changes do not stale development evidence and vice versa without an explicit edge.
    required: true
    evidence: [check.tests.freshness, check.models.full]
  - id: req.closure.frozen-materialization
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Frozen validation materializes every governed source"
    claim: Every check binds concrete admitted inputs that survive frozen materialization, ignored internal records stay out, each owner creates its own runtime prerequisites, and metadata-free frozen roots do not pretend to contain Git state.
    required: true
    evidence: [check.tests.routing, check.models.alignment, check.testmesh.plan, check.tests.full]
  - id: req.closure.no-progress
    source: "specs/evidence-freshness-closure/spec.md#Requirement: Repeated no-progress loops terminate visibly"
    claim: Identical failed packets and artifacts cannot loop forever.
    required: true
    evidence: [check.tests.freshness, check.models.full, check.tests.adversarial]

checks:
  - id: check.tests.routing
    kind: command
    semantic_check_id: logic-writing.routing.focused
    execution_id: create-logic-writing.routing.v1
    validation_scope: focused
    snapshot_policy: live
    toolchain_identity: python-pytest
    input_selectors: [skills/logic-writing/scripts/select_route.py, skills/logic-writing/assets/schemas/route-decision.schema.json, tests/unit/test_routing.py]
    depends_on_receipts: []
    command: python
    args: [-m, pytest, -q, tests/unit/test_routing.py]
    timeout_seconds: 300
    required: true
    covers: [req.routing.one-owner, req.routing.terminal-deliverable, req.routing.bounded-child, req.routing.fingerprint, req.routing.ambiguity, req.routing.skip, req.closure.frozen-materialization]
    expected: {exit_code: 0}

