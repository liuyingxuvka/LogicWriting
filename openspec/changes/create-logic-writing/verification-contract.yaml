    input_selectors: [skills/logic-writing/scripts/**, skills/logic-writing/assets/schemas/**, tests/adversarial/**, tests/fixtures/**]
    depends_on_receipts: [check.tests.routing, check.tests.adapters, check.tests.investigation, check.tests.academic, check.tests.reader, check.tests.freshness]
    command: python
    args: [-m, pytest, -q, tests/adversarial]
    timeout_seconds: 1200
    required: true
    covers: [req.routing.provider-boundary, req.investigation.candidate-boundary, req.investigation.traceguard, req.investigation.failure-visibility, req.investigation.verifier-closure, req.academic.documents, req.academic.citations, req.reader.brief, req.reader.actual-text, req.reader.semantic-scope, req.reader.flow, req.reader.boundaries, req.closure.verifier-derived, req.closure.minimum-content, req.closure.monotonic, req.closure.no-substitution, req.closure.broad, req.closure.render, req.closure.no-progress]
    expected: {exit_code: 0}

  - id: check.tests.e2e
    kind: command
    semantic_check_id: logic-writing.routes.e2e
    execution_id: create-logic-writing.e2e.v1
    validation_scope: full
    snapshot_policy: frozen
    toolchain_identity: python-pytest
    input_selectors: [skills/logic-writing/**, tests/e2e/**, tests/fixtures/**]
    depends_on_receipts: [check.tests.investigation, check.tests.academic, check.tests.reader, check.tests.freshness, check.models.full, check.tests.adversarial]
    command: python
    args: [-m, pytest, -q, tests/e2e]
    timeout_seconds: 1800
    required: true
    covers: [req.routing.one-owner, req.routing.terminal-deliverable, req.routing.bounded-child, req.investigation.contract, req.investigation.depth, req.investigation.adjudication, req.investigation.packet, req.academic.owner, req.academic.evidence-handoff, req.academic.actual-artifact, req.academic.final-owner, req.reader.two-room, req.reader.genre, req.closure.native-owners, req.closure.final-owner, req.closure.residual-risk]
    expected: {exit_code: 0}

  - id: check.reader.judgment
    kind: command
    semantic_check_id: logic-writing.reader-judgment.current-artifact
    execution_id: create-logic-writing.reader-judgment.v1
    validation_scope: full
    snapshot_policy: frozen
    toolchain_identity: logic-writing-judgment-validator-v1
    input_selectors: [scripts/check_reader_judgment.py, scripts/prepare_reader_quality_receipt.py, skills/logic-writing/references/shared/human-writing.md, skills/logic-writing/scripts/**, skills/logic-writing/assets/schemas/reader-judgment.schema.json, tests/support.py, tests/fixtures/forward/**]
    depends_on_receipts: [check.tests.reader, check.tests.e2e]
    command: python
    args: [scripts/check_reader_judgment.py, --root, ., --json]
