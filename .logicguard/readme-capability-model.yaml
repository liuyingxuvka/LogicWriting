model:
  id: logic_writing_readme_capability_model
  title: "Logic Writing public capability and boundary model"
  root_claim: C0
  target_units:
    - unit_id: "unit:public-readme"
      node_ids: [C0, E1, E2, E3, E4, E5, W0, A1, L1, R1]
  model_cards:
    - card_id: "card:public-product-identity"
      node_ids: [C0, E1, E2, E3, E4, E5, W0, A1, L1, R1]
      importance: 1.0
  role_dispositions:
